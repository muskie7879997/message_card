<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>免罪符</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:18px;
}

button{
    padding:10px 20px;
    font-size:18px;
}

#result{
    margin-top:30px;
    font-size:28px;
}
</style>

</head>
<body>

<h1>IDを入力してください</h1>

<input id="idInput" onkeydown="if(event.key==='Enter') checkID()">

<button onclick="checkID()">
表示
</button>

<div id="result" style="
    white-space: pre-wrap;
    text-align: left;
    max-width: 800px;
    margin: 30px auto;
"></div>

<script>
async function typeWriter(text, element) {

    for (let i = 0; i <= text.length; i++) {

        element.innerText =
            text.slice(0, i) + "│";

        await new Promise(resolve =>
            setTimeout(resolve, 20)
        );
    }

    element.innerText = text;
}


async function checkID() {

    const id = document
        .getElementById("idInput")
        .value
        .trim()
        .toUpperCase();

    try {

        const response = await fetch(
            "messages/" + id + ".txt"
        );

        if (!response.ok) {
            throw new Error();
        }

        const text = await response.text();

        await typeWriter(
            text,
            document.getElementById("result")
        );

    } catch {

        document.getElementById("result").innerText =
            "IDが見つかりません";

    }

}
    
</script>

</body>
</html>
